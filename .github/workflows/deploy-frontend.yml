name: Build and Deploy Frontend

on:
  push:
    branches: [ main ]
    paths:
      - 'front-alojamientos-main/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./front-alojamientos-main
          file: ./front-alojamientos-main/Dockerfile
          push: true
          tags: |
            ghcr.io/113012davidt/arroyo-seco-front:latest
            ghcr.io/113012davidt/arroyo-seco-front:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.GCE_HOST }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          envs: GHCR_USERNAME,GHCR_TOKEN
          script: |
            if [ -n "$GHCR_USERNAME" ] && [ -n "$GHCR_TOKEN" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi
            cd ~/back-alojamientos
            git pull origin main
            cd front-alojamientos-main
            export FRONT_IMAGE=ghcr.io/113012davidt/arroyo-seco-front:latest
            docker compose pull front
            docker compose up -d --remove-orphans
            docker image prune -f
