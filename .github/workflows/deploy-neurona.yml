name: Deploy Neurona

on:
  push:
    branches: [ main ]
    paths:
      - 'back-alojamientos-main/neurona/**'
      - '.github/workflows/deploy-neurona.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCE_HOST }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          script: |
            cd ~/back-alojamientos
            git pull origin main
            cd back-alojamientos-main/neurona
            docker compose up -d --build
            docker image prune -f
